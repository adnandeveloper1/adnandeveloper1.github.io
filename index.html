<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Muhammad Adnan | Android Developer</title>
    <style>
        /* CSS Variables for Theme */
        :root {
            --bg-dark: #0d1117; 
            --nav-bg: #010409; 
            --card-green: #161b22; 
            --accent-green: #39d353; 
            --text-main: #f0f6fc;
            --text-muted: #8b949e;
            --border-color: #30363d;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        /* Navigation Menu */
        nav {
            background-color: var(--nav-bg);
            padding: 1rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
            border-bottom: 1px solid var(--border-color);
        }

        nav .logo {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--text-main);
            letter-spacing: 1px;
        }

        nav ul {
            display: flex;
            list-style: none;
            gap: 2rem;
        }

        nav a {
            color: var(--text-main);
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: 500;
            transition: color 0.3s ease;
        }

        nav a:hover {
            color: var(--accent-green);
        }

        /* Hero Section */
        .hero {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center; 
            text-align: center;
            padding: 120px 10% 40px;
        }

        .profile-img {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid var(--border-color);
            margin-bottom: 2rem;
        }

        .welcome-badge {
            background-color: rgba(57, 211, 83, 0.1);
            color: var(--accent-green);
            padding: 0.4rem 1.2rem;
            border-radius: 50px;
            font-size: 0.9rem;
            font-weight: 500;
            margin-bottom: 1.5rem;
            border: 1px solid rgba(57, 211, 83, 0.2);
        }

        .hero h1 {
            font-size: 4rem;
            font-weight: 800;
            line-height: 1.1;
            margin-bottom: 1.5rem;
            color: var(--text-main);
        }

        .hero h1 .highlight {
            color: var(--accent-green);
        }

        .hero h2 {
            font-size: 2rem;
            font-weight: 400;
            color: var(--text-muted);
            margin-bottom: 1.5rem;
        }

        .hero p {
            max-width: 650px;
            font-size: 1.1rem;
            color: var(--text-muted);
            margin-bottom: 3rem;
        }

        .btn-group {
            display: flex;
            gap: 1.5rem;
            flex-wrap: wrap;
            justify-content: center;
        }

        .btn {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.8rem 1.8rem;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            font-size: 1rem;
            transition: all 0.3s ease;
            border: 1px solid transparent;
        }

        .btn-primary {
            background-color: var(--accent-green);
            color: #000; 
        }

        .btn-primary:hover {
            background-color: #2ea043;
            transform: translateY(-2px);
        }
        
        .btn-secondary {
            background-color: transparent;
            color: var(--text-main);
            border-color: var(--text-muted);
        }

        .btn-secondary:hover {
            border-color: var(--text-main);
            transform: translateY(-2px);
        }

        /* Common Section Styles */
        section {
            padding: 6rem 10%;
            border-top: 1px solid var(--border-color);
        }

        .section-title {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 3rem;
            display: flex;
            align-items: center;
            justify-content: center; 
            color: var(--text-main);
        }

        /* Skills / Technical Arsenal Section */
        .skills-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 2rem;
            max-width: 1000px;
            margin: 0 auto;
        }

        .skill-category {
            background-color: var(--card-green);
            padding: 2rem;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            transition: transform 0.3s ease;
        }

        .skill-category:hover {
            transform: translateY(-5px);
            border-color: var(--accent-green);
        }

        .skill-category h3 {
            color: var(--text-main);
            font-size: 1.2rem;
            margin-bottom: 1.5rem;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 0.5rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .skill-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 0.8rem;
        }

        .skill-tag {
            font-size: 0.9rem;
            color: var(--accent-green);
            background-color: rgba(57, 211, 83, 0.05);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            border: 1px solid rgba(57, 211, 83, 0.2);
            font-weight: 500;
        }

        /* Experience & Education Section */
        .timeline {
            display: flex;
            flex-direction: column;
            gap: 2rem;
            max-width: 800px;
            margin: 0 auto;
        }

        .timeline-item {
            background-color: var(--card-green);
            padding: 2rem;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            transition: transform 0.3s ease;
        }

        .timeline-item:hover {
            transform: translateY(-5px);
            border-color: var(--accent-green);
        }

        .timeline-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }

        .timeline-title {
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--text-main);
        }

        .timeline-company {
            color: var(--text-muted);
            font-weight: 500;
            margin-top: 0.2rem;
        }

        .timeline-date {
            font-size: 0.9rem;
            color: var(--accent-green);
        }

        .timeline-content ul {
            list-style-position: inside;
            color: var(--text-muted);
            margin-top: 1rem;
        }

        .timeline-content li {
            margin-bottom: 0.5rem;
        }

        /* Projects Section */
        .project-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 2.5rem;
        }

        .project-card {
            background-color: var(--card-green);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            border: 1px solid var(--border-color);
            transition: transform 0.3s ease;
            overflow: hidden; 
        }

        .project-card:hover {
            transform: translateY(-5px);
            border-color: var(--accent-green);
        }

        .project-img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-bottom: 1px solid var(--border-color);
            background-color: var(--nav-bg); 
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
        }

        /* Video styling */
        video.project-img {
            object-fit: cover;
            outline: none;
            background-color: #000;
        }

        /* Certificate specific image style */
        .cert-img {
            width: 100%;
            height: 220px;
            object-fit: cover;
            object-position: top;
            border-bottom: 1px solid var(--border-color);
            background-color: #fff; 
        }

        /* Media Scroller for Multiple Videos */
        .media-scroller {
            display: flex;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            border-bottom: 1px solid var(--border-color);
            scrollbar-width: thin;
            scrollbar-color: var(--border-color) var(--nav-bg);
        }
        
        .media-scroller::-webkit-scrollbar {
            height: 6px;
        }
        
        .media-scroller::-webkit-scrollbar-track {
            background: var(--nav-bg);
        }
        
        .media-scroller::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 10px;
        }

        .media-scroller video {
            flex: 0 0 100%;
            height: 200px;
            object-fit: cover;
            scroll-snap-align: start;
            background-color: #000;
            outline: none;
        }

        .project-content {
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
            justify-content: space-between;
        }

        .project-title {
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--text-main);
            margin-bottom: 0.5rem;
        }

        .project-subtitle {
            font-size: 0.9rem;
            color: var(--accent-green);
            margin-bottom: 1rem;
            font-weight: 500;
        }
        
        .scroll-hint {
            font-size: 0.75rem;
            color: var(--accent-green);
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .project-desc {
            color: var(--text-muted);
            font-size: 0.95rem;
            margin-bottom: 1.5rem;
            flex-grow: 1;
        }

        .tech-stack {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }

        .tech-tag {
            font-size: 0.8rem;
            color: var(--accent-green);
            background-color: rgba(57, 211, 83, 0.1);
            padding: 0.3rem 0.8rem;
            border-radius: 50px;
        }

        .project-links-container {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            margin-top: auto;
        }

        .project-link {
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
            color: var(--text-main);
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            transition: color 0.3s ease;
        }

        .project-link:hover {
            color: var(--accent-green);
        }

        /* Footer / Contact Section */
        footer {
            padding: 4rem 10%;
            text-align: center;
            background-color: var(--nav-bg);
            border-top: 1px solid var(--border-color);
        }

        .contact-info {
            margin-bottom: 2rem;
        }

        .contact-info a {
            color: var(--accent-green);
            text-decoration: none;
            font-weight: 500;
            font-size: 1.2rem;
        }

        .social-links {
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .social-links a {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 1.1rem;
            transition: color 0.3s ease;
        }

        .social-links a:hover {
            color: var(--accent-green);
        }

        .copyright {
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        @media (max-width: 768px) {
            .hero { padding-top: 120px; }
            .hero h1 { font-size: 2.5rem; }
            .hero h2 { font-size: 1.5rem; }
            nav ul { display: none; }
            .timeline-header { flex-direction: column; align-items: flex-start; }
            .timeline-date { margin-top: 0.5rem; }
        }
    </style>
</head>
<body>

        <div class="logo">Adnan Shaheen</div>
        <ul>

        </ul>

        <img src="profile.jpg.png" alt="Muhammad Adnan" class="profile-img">
        
        <div class="welcome-badge">Welcome to my portfolio</div>
